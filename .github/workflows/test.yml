name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build liburing-dev clang-19 clang-tools-19 \
            libgrpc++-dev libprotobuf-dev protobuf-compiler protobuf-compiler-grpc

      - name: Configure
        run: cmake -B build -G Ninja -DPLEXDB_ENABLE_TESTS=ON -DPLEXDB_ENABLE_LOGGING=ON -DPLEXDB_DEBUG=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=clang++-19 -DCMAKE_C_COMPILER=clang-19

      - name: Build
        run: ninja -C build

      - name: Build OTLP plugin
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-19 -DCMAKE_C_COMPILER=clang-19
          ninja -C build
        working-directory: objstore/plugins/log_otel
      
      - name: Build file plugin
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-19 -DCMAKE_C_COMPILER=clang-19
          ninja -C build
        working-directory: objstore/plugins/log_file

      - name: Run core tests
        run: ./build/core/core_tests --skip-benchmarks

      - name: Run objstore tests
        run: ./build/objstore/objstore_tests --skip-benchmarks
