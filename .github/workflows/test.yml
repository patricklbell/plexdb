name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  format-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-19

      - name: Check formatting
        run: |
          find . \
            -not -path '*/build/*' \
            -not -path '*/third_party/stb/*' \
            -not -path '*/tools/*' \
            \( -name '*.cpp' -o -name '*.cppm' -o -name '*.h' \) \
            -print0 \
            | xargs -0 clang-format-19 --dry-run --Werror

  test:
    needs: format-check
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build liburing-dev clang-19 clang-tools-19 \
            libgrpc++-dev libprotobuf-dev protobuf-compiler protobuf-compiler-grpc

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DPLEXDB_ENABLE_TESTS=ON \
            -DPLEXDB_ENABLE_PLUGINS=ON \
            -DPLEXDB_DEBUG=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_C_COMPILER=clang-19 \
            -DCMAKE_CXX_SCAN_FOR_MODULES=ON

      - name: Build
        run: ninja -C build

      - name: Build OTLP plugin
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_C_COMPILER=clang-19
          ninja -C build
        working-directory: plugins/otel

      - name: Build log plugin
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_C_COMPILER=clang-19
          ninja -C build
        working-directory: plugins/log

      - name: Run core tests
        run: ./build/core/core_tests --skip-benchmarks

      - name: Run cql tests
        run: ./build/cql/cql_tests --skip-benchmarks

      - name: Run keyvalue tests
        run: ./build/keyvalue/keyvalue_tests

  cql-conformance:
    needs: test
    if: github.event_name == 'push'
    uses: ./.github/workflows/cql-conformance.yml

  keyvalue-conformance:
    needs: test
    if: github.event_name == 'push'
    uses: ./.github/workflows/keyvalue-conformance.yml
