name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build liburing-dev clang-19

      - name: Configure
        run: cmake -B build -G Ninja -DBUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=clang++-19 -DCMAKE_C_COMPILER=clang-19

      - name: Build
        run: ninja -C build

      - name: Run plexdb tests
        run: ./build/plexdb/plexdb_tests --skip-benchmarks

      - name: Run objstore tests
        run: ./build/objstore/objstore_tests --skip-benchmarks
