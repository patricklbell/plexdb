name: Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y ninja-build liburing-dev clang-21

      - name: Configure
        run: cmake -B build -G Ninja -DBUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=clang++-21 -DCMAKE_C_COMPILER=clang-21

      - name: Build
        run: ninja -C build

      - name: Run plexdb tests
        run: ./build/plexdb/plexdb_tests --skip-benchmarks

      - name: Run objstore tests
        run: ./build/objstore/objstore_tests --skip-benchmarks
