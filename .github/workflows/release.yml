name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build liburing-dev clang-19 clang-tools-19 \
            libgrpc++-dev libprotobuf-dev protobuf-compiler protobuf-compiler-grpc

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_C_COMPILER=clang-19 \
            -DCMAKE_CXX_SCAN_FOR_MODULES=ON \
            -DBUILD_SHARED_LIBS=OFF

      - name: Build
        run: ninja -C build

      - name: Build OTLP plugin
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-19 -DCMAKE_C_COMPILER=clang-19
          ninja -C build
        working-directory: plugins/otel

      - name: Collect artifacts
        run: |
          cp build/cql/plexdb_cql_server                  plexdb-cql-linux-${{ matrix.arch }}
          cp build/keyvalue/plexdb_keyvalue_server        plexdb-keyvalue-linux-${{ matrix.arch }}
          cp plugins/otel/build/libplexdb_otel_plugin.so  libplexdb_otel_plugin-linux-${{ matrix.arch }}.so

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            plexdb-cql-linux-${{ matrix.arch }}
            plexdb-keyvalue-linux-${{ matrix.arch }}
            plexdb-core-linux-${{ matrix.arch }}.tar.gz
            libplexdb_otel_plugin-linux-${{ matrix.arch }}.so

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-x64

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            plexdb-cql-linux-x64
            plexdb-keyvalue-linux-x64
            libplexdb_otel_plugin-linux-x64.so
            plexdb-cql-linux-arm64
            plexdb-keyvalue-linux-arm64
            libplexdb_otel_plugin-linux-arm64.so
