name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y ninja-build liburing-dev clang-21

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=clang++-21 -DCMAKE_C_COMPILER=clang-21

      - name: Build
        run: ninja -C build

      - name: Upload objstore_server
        uses: actions/upload-artifact@v4
        with:
          name: objstore_server-linux-x64
          path: build/objstore/objstore_server

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: objstore_server-linux-x64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: objstore_server
