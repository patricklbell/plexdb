name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build liburing-dev clang-19 clang-tools-19 \
            libgrpc++-dev libprotobuf-dev protobuf-compiler protobuf-compiler-grpc

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_C_COMPILER=clang-19 \
            -DCMAKE_CXX_SCAN_FOR_MODULES=ON \
            -DBUILD_SHARED_LIBS=OFF

      - name: Build
        run: ninja -C build

      - name: Build OTLP plugin
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-19 -DCMAKE_C_COMPILER=clang-19
          ninja -C build
        working-directory: plugins/otel

      - name: Collect artifacts
        run: |
          cp build/cql/plexdb_cql_server                  plexdb-cql-linux-${{ matrix.arch }}
          cp build/keyvalue/plexdb_keyvalue_server        plexdb-keyvalue-linux-${{ matrix.arch }}
          cp plugins/otel/build/libplexdb_otel_plugin.so  libplexdb_otel_plugin-linux-${{ matrix.arch }}.so

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            plexdb-cql-linux-${{ matrix.arch }}
            plexdb-keyvalue-linux-${{ matrix.arch }}
            libplexdb_otel_plugin-linux-${{ matrix.arch }}.so

  package-rpm:
    needs: build
    strategy:
      matrix:
        include:
          - arch: x64
            rpm_arch: x86_64
          - arch: arm64
            rpm_arch: aarch64
    runs-on: ubuntu-24.04
    container: fedora:40

    steps:
      - uses: actions/checkout@v4

      - name: Install rpmbuild
        run: dnf install -y rpm-build libcap

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-${{ matrix.arch }}

      - name: Build RPM
        run: |
          version="${GITHUB_REF_NAME#v}"
          topdir="$PWD/rpmbuild"
          mkdir -p "$topdir/SOURCES" "$topdir/BUILD" "$topdir/RPMS" "$topdir/SPECS" "$topdir/BUILDROOT"
          cp plexdb-cql-linux-${{ matrix.arch }}               "$topdir/SOURCES/plexdb_cql_server"
          cp plexdb-keyvalue-linux-${{ matrix.arch }}          "$topdir/SOURCES/plexdb_keyvalue_server"
          cp libplexdb_otel_plugin-linux-${{ matrix.arch }}.so "$topdir/SOURCES/libplexdb_otel_plugin.so"
          rpmbuild -bb packaging/rpm/plexdb.spec \
            --define "_topdir $topdir" \
            --define "plexdb_version $version" \
            --define "plexdb_arch ${{ matrix.rpm_arch }}"
          find "$topdir/RPMS" -name '*.rpm' -exec cp {} "plexdb-${{ matrix.rpm_arch }}.rpm" \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.arch }}
          path: plexdb-${{ matrix.rpm_arch }}.rpm

  package-deb:
    needs: build
    strategy:
      matrix:
        include:
          - arch: x64
            deb_arch: amd64
          - arch: arm64
            deb_arch: arm64
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-${{ matrix.arch }}

      - name: Build DEB
        run: |
          version="${GITHUB_REF_NAME#v}"
          pkgroot="$PWD/pkgroot"
          mkdir -p "$pkgroot/DEBIAN" "$pkgroot/usr/bin" "$pkgroot/usr/lib/plexdb/plugins"
          install -m755 plexdb-cql-linux-${{ matrix.arch }}               "$pkgroot/usr/bin/plexdb_cql_server"
          install -m755 plexdb-keyvalue-linux-${{ matrix.arch }}          "$pkgroot/usr/bin/plexdb_keyvalue_server"
          install -m644 libplexdb_otel_plugin-linux-${{ matrix.arch }}.so "$pkgroot/usr/lib/plexdb/plugins/libplexdb_otel_plugin.so"
          install -m755 packaging/deb/postinst "$pkgroot/DEBIAN/postinst"
          sed -e "s/__VERSION__/$version/" -e "s/__ARCH__/${{ matrix.deb_arch }}/" \
            packaging/deb/control.template > "$pkgroot/DEBIAN/control"
          dpkg-deb --build --root-owner-group "$pkgroot" "plexdb-${{ matrix.deb_arch }}.deb"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: plexdb-${{ matrix.deb_arch }}.deb

  release:
    needs: [build, package-rpm, package-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-x64

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64

      - name: Download rpm x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: rpm-x64

      - name: Download rpm arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: rpm-arm64

      - name: Download deb x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-x64

      - name: Download deb arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-arm64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            plexdb-cql-linux-x64
            plexdb-keyvalue-linux-x64
            libplexdb_otel_plugin-linux-x64.so
            plexdb-cql-linux-arm64
            plexdb-keyvalue-linux-arm64
            libplexdb_otel_plugin-linux-arm64.so
            plexdb-x86_64.rpm
            plexdb-aarch64.rpm
            plexdb-amd64.deb
            plexdb-arm64.deb
