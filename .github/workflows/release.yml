name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build liburing-dev clang-19 clang-tools-19 \
            libgrpc++-dev libprotobuf-dev protobuf-compiler protobuf-compiler-grpc

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_C_COMPILER=clang-19 \
            -DPLEXDB_DEBUG=OFF \
            -DPLEXDB_ENABLE_TESTS=OFF \
            -DBUILD_SHARED_LIBS=OFF

      - name: Build
        run: ninja -C build

      - name: Package core
        run: |
          mkdir -p pkg/core/lib pkg/core/modules pkg/core/macros
          cp build/core/libcore.a pkg/core/lib/
          find core -name '*.cppm' | while read f; do
            mkdir -p "pkg/core/modules/$(dirname "$f")"
            cp "$f" "pkg/core/modules/$f"
          done
          cp macros/macros.h pkg/core/macros/
          tar -czf core-linux-x64.tar.gz -C pkg core

      - name: Build OTLP plugin
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-19 -DCMAKE_C_COMPILER=clang-19
          ninja -C build
        working-directory: objstore/plugins/log_otel

      - name: Package objstore
        run: |
          cp build/objstore/objstore_server objstore-linux-x64

      - name: Package OTLP plugin
        run: cp objstore/plugins/log_otel/build/libobjstore_log_otel.so .

      - name: Upload objstore
        uses: actions/upload-artifact@v4
        with:
          name: objstore-linux-x64
          path: objstore-linux-x64

      - name: Upload core
        uses: actions/upload-artifact@v4
        with:
          name: core-linux-x64
          path: core-linux-x64.tar.gz

      - name: Upload OTLP plugin
        uses: actions/upload-artifact@v4
        with:
          name: libobjstore_log_otel
          path: libobjstore_log_otel.so

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download objstore
        uses: actions/download-artifact@v4
        with:
          name: objstore-linux-x64

      - name: Download core
        uses: actions/download-artifact@v4
        with:
          name: core-linux-x64

      - name: Download OTLP plugin
        uses: actions/download-artifact@v4
        with:
          name: libobjstore_log_otel

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            objstore-linux-x64
            core-linux-x64.tar.gz
            libobjstore_log_otel.so
