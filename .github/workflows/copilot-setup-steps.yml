name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build liburing-dev clang-19 clang-tools-19 nodejs npm \
            libgrpc++-dev libprotobuf-dev protobuf-compiler protobuf-compiler-grpc

      - name: Configure CMake
        run: cmake -B build -G Ninja \
          -DCMAKE_CXX_COMPILER=clang++-19 \
          -DCMAKE_C_COMPILER=clang-19 \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_SCAN_FOR_MODULES=ON \
          -DPLEXDB_ENABLE_TESTS=ON \
          -DPLEXDB_ENABLE_PLUGINS=ON

      - name: Build
        run: ninja -C build

      - name: Build OTLP plugin
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_C_COMPILER=clang-19
          ninja -C build
        working-directory: plugins/otel

      - name: Build log plugin
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            -DCMAKE_C_COMPILER=clang-19 \
            -DCMAKE_BUILD_TYPE=Debug
          ninja -C build
        working-directory: plugins/log

      - name: Install cql_node_example dependencies
        run: npm install
        working-directory: tools/cql_node_example

      - name: Install cql_py_example dependencies
        run: |
          curl -Ls https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          uv sync --no-build-isolation-package cassandra-driver
        working-directory: tools/cql_py_example
